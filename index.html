<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Balance</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236366f1' stroke-width='2'><rect x='2' y='6' width='20' height='14' rx='2'/><path d='M2 10h20'/><path d='M12 14h4'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══ SVG Sprite ═══ -->
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
    <defs>
      <symbol id="i-wallet" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="6" width="20" height="14" rx="2"/>
        <path d="M2 10h20"/>
        <path d="M12 14h4"/>
      </symbol>
      <symbol id="i-arrow-up" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"/>
        <polyline points="5 12 12 5 19 12"/>
      </symbol>
      <symbol id="i-arrow-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <polyline points="19 12 12 19 5 12"/>
      </symbol>
      <symbol id="i-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </symbol>
      <symbol id="i-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </symbol>
      <symbol id="i-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6"/>
        <path d="M14 11v6"/>
        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      </symbol>
      <symbol id="i-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </symbol>
      <symbol id="i-sparkles" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5z"/>
        <path d="M19 14l1 3 3 1-3 1-1 3-1-3-3-1 3-1z" opacity=".6"/>
        <path d="M5 17l.7 2 .8.5-.8.5-.7 2-.7-2-.8-.5.8-.5z" opacity=".4"/>
      </symbol>
      <symbol id="i-trending-up" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
        <polyline points="16 7 22 7 22 13"/>
      </symbol>
      <symbol id="i-trending-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/>
        <polyline points="16 17 22 17 22 11"/>
      </symbol>
      <symbol id="i-inbox" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/>
        <path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>
      </symbol>
      <symbol id="i-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </symbol>
    </defs>
  </svg>

  <!-- ═══ Background ═══ -->
  <div class="bg-gradient"></div>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
  </div>
  <div class="bg-noise"></div>
  <div class="bg-vignette"></div>
  <div class="bg-grid"></div>
  <div class="bg-spotlight" id="spotlight"></div>
  <div class="scroll-progress" id="scrollProgress"></div>

  <!-- ═══ Main ═══ -->
  <div class="container">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon svg-icon" id="logoIcon">
          <svg width="36" height="36"><use xlink:href="#i-wallet"/></svg>
        </span>
        <h1 class="gradient-text">My Balance</h1>
      </div>
      <p class="subtitle">Track your finances</p>
    </header>

    <!-- Balance Card -->
    <div class="balance-card" id="balanceCard">
      <div class="balance-shine"></div>
      <div class="balance-glow" id="balanceGlow"></div>
      <div class="balance-inner">
        <div class="balance-top">
          <span class="svg-icon sparkles-icon">
            <svg width="20" height="20"><use xlink:href="#i-sparkles"/></svg>
          </span>
          <span class="balance-label">Current Balance</span>
          <span class="svg-icon sparkles-icon sparkles-right">
            <svg width="20" height="20"><use xlink:href="#i-sparkles"/></svg>
          </span>
        </div>
        <span class="balance-amount" id="balance">PKR 0</span>
        <div class="balance-bar">
          <div class="balance-bar-fill" id="balanceBar"></div>
        </div>
        <div class="balance-stats">
          <div class="stat stat-income">
            <svg width="16" height="16"><use xlink:href="#i-trending-up"/></svg>
            <span id="totalIncome">PKR 0</span>
          </div>
          <div class="stat stat-expense">
            <svg width="16" height="16"><use xlink:href="#i-trending-down"/></svg>
            <span id="totalExpense">PKR 0</span>
          </div>
        </div>
      </div>
      <div class="progress-ring-wrap" id="progressRingWrap">
        <svg class="progress-ring" viewBox="0 0 36 36">
          <circle class="progress-ring-bg" cx="18" cy="18" r="15.9"/>
          <circle class="progress-ring-fill" id="progressRingFill" cx="18" cy="18" r="15.9"/>
        </svg>
        <span class="progress-ring-text" id="progressRingText">0%</span>
      </div>
    </div>

    <!-- Forms Row -->
    <div class="row">
      <!-- Income Card -->
      <div class="card income-card" id="incomeCard">
        <div class="card-ripple-wrap">
          <div class="card-header">
            <div class="card-icon income-icon">
              <svg width="18" height="18"><use xlink:href="#i-arrow-up"/></svg>
            </div>
            <h2>Add Income</h2>
          </div>
          <form id="incomeForm">
            <div class="input-group">
              <input type="text" id="incomeSource" placeholder=" " required>
              <label for="incomeSource">Source</label>
              <div class="input-underline"></div>
              <div class="input-glow"></div>
            </div>
            <div class="input-group">
              <input type="number" id="incomeAmount" placeholder=" " min="0" required>
              <label for="incomeAmount">Amount</label>
              <div class="input-underline"></div>
              <div class="input-glow"></div>
            </div>
            <button type="submit" class="btn btn-income" id="incomeBtn">
              <span class="btn-text">
                <svg width="16" height="16"><use xlink:href="#i-plus"/></svg>
                Add Income
              </span>
              <span class="btn-success">
                <svg width="18" height="18"><use xlink:href="#i-check"/></svg>
              </span>
              <span class="btn-loading">
                <svg class="spinner" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="10" opacity=".25"/><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/></svg>
              </span>
              <div class="btn-shine"></div>
            </button>
          </form>
        </div>
        <div class="card-ripple" id="incomeRipple"></div>
      </div>

      <!-- Expense Card -->
      <div class="card expense-card" id="expenseCard">
        <div class="card-ripple-wrap">
          <div class="card-header">
            <div class="card-icon expense-icon">
              <svg width="18" height="18"><use xlink:href="#i-arrow-down"/></svg>
            </div>
            <h2>Add Expense</h2>
          </div>
          <form id="expenseForm">
            <div class="input-group">
              <input type="text" id="expenseSource" placeholder=" " required>
              <label for="expenseSource">Source</label>
              <div class="input-underline"></div>
              <div class="input-glow"></div>
            </div>
            <div class="input-group">
              <input type="number" id="expenseAmount" placeholder=" " min="0" required>
              <label for="expenseAmount">Amount</label>
              <div class="input-underline"></div>
              <div class="input-glow"></div>
            </div>
            <button type="submit" class="btn btn-expense" id="expenseBtn">
              <span class="btn-text">
                <svg width="16" height="16"><use xlink:href="#i-plus"/></svg>
                Add Expense
              </span>
              <span class="btn-success">
                <svg width="18" height="18"><use xlink:href="#i-check"/></svg>
              </span>
              <span class="btn-loading">
                <svg class="spinner" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="10" opacity=".25"/><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/></svg>
              </span>
              <div class="btn-shine"></div>
            </button>
          </form>
        </div>
        <div class="card-ripple" id="expenseRipple"></div>
      </div>
    </div>

    <!-- Transactions Card -->
    <div class="card transactions-card" id="transactionsCard">
      <div class="card-header">
        <div class="card-icon history-icon">
          <svg width="18" height="18"><use xlink:href="#i-clock"/></svg>
        </div>
        <h2>Transactions</h2>
        <span class="transaction-count" id="transactionCount">0</span>
      </div>
      <div id="transactionList">
        <div class="empty-state" id="emptyState">
          <div class="empty-illustration">
            <svg class="empty-svg" viewBox="0 0 120 100" fill="none">
              <rect x="20" y="30" width="80" height="55" rx="8" stroke="#3a3a5c" stroke-width="2" stroke-dasharray="4 4"/>
              <path d="M50 55h20M50 65h14" stroke="#3a3a5c" stroke-width="2" stroke-linecap="round"/>
              <circle cx="60" cy="25" r="8" fill="rgba(99,102,241,0.15)" stroke="#6366f1" stroke-width="1.5"/>
              <path d="M57 25l2 2 4-4" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <p>No transactions yet</p>
          <p class="empty-sub">Add income or expenses above</p>
        </div>
      </div>
      <button id="clearAll" class="btn btn-clear">
        <span class="btn-text">
          <svg width="16" height="16"><use xlink:href="#i-trash"/></svg>
          Clear All
        </span>
      </button>
    </div>

    <!-- Toast -->
    <div class="toast-wrap" id="toastWrap"></div>

    <!-- Scroll to Top -->
    <button class="scroll-top" id="scrollTop" aria-label="Scroll to top">
      <svg width="20" height="20"><use href="#i-arrow-up"/></svg>
    </button>

  </div>

  <script src="https://unpkg.com/lenis@1.1.18/dist/lenis.min.js"></script>
  <script src="https://unpkg.com/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
