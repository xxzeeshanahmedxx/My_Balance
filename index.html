<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Balance</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236366f1' stroke-width='2'><rect x='2' y='6' width='20' height='14' rx='2'/><path d='M2 10h20'/><path d='M12 14h4'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta name="theme-color" content="#10b981">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
    <defs>
      <symbol id="i-trending-up" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
        <polyline points="16 7 22 7 22 13"/>
      </symbol>
      <symbol id="i-trending-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/>
        <polyline points="16 17 22 17 22 11"/>
      </symbol>
      <symbol id="i-arrow-up" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"/>
        <polyline points="5 12 12 5 19 12"/>
      </symbol>
      <symbol id="i-arrow-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <polyline points="19 12 12 19 5 12"/>
      </symbol>
      <symbol id="i-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6"/>
        <path d="M14 11v6"/>
        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      </symbol>
      <symbol id="i-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </symbol>
      <symbol id="i-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </symbol>
      <symbol id="i-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </symbol>
    </defs>
  </svg>

  <div class="bg-gradient"></div>
  <div class="bg-noise"></div>

  <div id="loginOverlay">
    <div class="login-card">
      <div class="login-logo">₨</div>
      <h1 class="login-title">My Balance</h1>
      <p class="login-subtitle">Sign in to your account</p>
      <div class="login-error" id="loginError">
        <svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/></svg>
        Invalid password
      </div>
      <form id="loginForm">
        <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password" autofocus>
        <button type="submit" id="loginBtn"><span id="loginBtnText">Sign in</span><span class="login-spinner" id="loginSpinner"></span></button>
      </form>
    </div>
  </div>

  <div id="app" style="display:none">
    <div class="container">

      <div class="balance-card" id="balanceCard">
        <div class="balance-currency">PKR</div>
        <div class="balance-amount" id="balance">0</div>
        <div class="balance-stats">
          <div class="balance-stat" id="incomeStat">
            <svg width="13" height="13"><use href="#i-trending-up"/></svg>
            <span id="totalIncome">0</span>
            <span class="balance-stat-label">Income</span>
          </div>
          <div class="balance-stat-divider"></div>
          <div class="balance-stat" id="expenseStat">
            <svg width="13" height="13"><use href="#i-trending-down"/></svg>
            <span id="totalExpense">0</span>
            <span class="balance-stat-label">Expenses</span>
          </div>
        </div>
      </div>

      <div class="dashboard">

        <div class="card form-card">
          <h2 class="card-heading">Add transaction</h2>

          <div class="segmented-control" id="typeToggle">
            <button class="segment active" data-type="income" type="button">Income</button>
            <button class="segment" data-type="expense" type="button">Expense</button>
          </div>

          <form id="transactionForm">
            <div class="input-group">
              <input type="text" id="source" placeholder="Source" required>
            </div>
            <div class="input-group">
              <input type="number" id="amount" placeholder="Amount" min="0" required>
            </div>
            <button type="submit" class="btn type-income" id="submitBtn">
              <span class="btn-text">
                <svg width="14" height="14"><use href="#i-plus"/></svg>
                Add Income
              </span>
              <span class="btn-loading">
                <svg class="spinner" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="10" opacity=".25"/><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/></svg>
              </span>
              <span class="btn-success">
                <svg width="18" height="18"><use href="#i-check"/></svg>
              </span>
            </button>
          </form>
        </div>

        <div class="card transactions-card">
          <div class="card-header">
            <h2 class="card-heading" style="margin-bottom:0">Transactions</h2>
            <span class="badge" id="transactionCount">0</span>
            <button id="logoutBtn" class="btn-icon" title="Sign out" aria-label="Sign out" style="color:#71717a">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
            <button id="clearAll" class="btn-icon" title="Clear all" aria-label="Clear all transactions">
              <svg width="15" height="15"><use href="#i-trash"/></svg>
            </button>
          </div>
          <div id="transactionList"></div>
        </div>

      </div>

    </div>
    <div class="toast-container" id="toastContainer"></div>
  </div>

  <script src="https://unpkg.com/lenis@1.1.18/dist/lenis.min.js"></script>
  <script src="https://unpkg.com/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
